version: '3.8'

services:
  wave-node-1:
    build:.
    command: ["0.0.0.0:4000", "secret", "/data/node1.db", "wave-node-2:4001"]
    ports: ["4000:4000", "8081:8081"]
    volumes: ["./data1:/data"]

  wave-node-2:
    build:.
    command: ["0.0.0.0:4001", "secret", "/data/node2.db", "wave-node-1:4000"]
    ports: ["4001:4001", "8082:8082"]
    volumes: ["./data2:/data"]

  wave-node-3:
    build:.
    command: ["0.0.0.0:4002", "secret", "/data/node3.db", "wave-node-1:4000"]
    ports: ["4002:4002", "8083:8083"]
    volumes: ["./data3:/data"]

  prometheus:
    image: prom/prometheus
    ports: ["9090:9090"]
    volumes: ["./prometheus.yml:/etc/prometheus/prometheus.yml"]

  grafana:
    image: grafana/grafana
    ports: ["3000:3000"]
    environment:
            - GF_SECURITY_ADMIN_PASSWORD=admin
